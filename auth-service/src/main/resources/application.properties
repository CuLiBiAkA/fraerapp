spring.application.name=fraerapp-auth
server.port=${AUTH_SERVER_PORT:8081}

spring.datasource.url=${AUTH_DATASOURCE_URL:jdbc:h2:file:/data/fraerapp-auth;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE}
spring.datasource.username=${AUTH_DATASOURCE_USERNAME:sa}
spring.datasource.password=${AUTH_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${AUTH_DATASOURCE_DRIVER:org.h2.Driver}
spring.flyway.enabled=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

auth.jwt.secret=${AUTH_JWT_SECRET:dev-auth-secret-change-me-dev-auth-secret}
auth.access-ttl-seconds=${AUTH_ACCESS_TTL_SECONDS:900}
auth.refresh-ttl-seconds=${AUTH_REFRESH_TTL_SECONDS:2592000}
auth.magic-link-ttl-seconds=${AUTH_MAGIC_LINK_TTL_SECONDS:900}
auth.cookie-secure=${AUTH_COOKIE_SECURE:false}
auth.cookie-same-site=${AUTH_COOKIE_SAME_SITE:Lax}
auth.dev-mode=${AUTH_DEV_MODE:true}
auth.public-base-url=${AUTH_PUBLIC_BASE_URL:http://localhost:8088}
auth.bootstrap-admin-email=${AUTH_BOOTSTRAP_ADMIN_EMAIL:}
auth.cors.allowed-origins=${AUTH_CORS_ALLOWED_ORIGINS:http://localhost:8088,http://localhost:8090}

spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
