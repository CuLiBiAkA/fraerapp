spring.application.name=fraerapp-auth
server.port=${AUTH_SERVER_PORT:8081}

spring.datasource.url=${AUTH_DATASOURCE_URL:jdbc:postgresql://auth-postgres:5432/fraerapp_auth}
spring.datasource.username=${AUTH_DATASOURCE_USERNAME:fraerapp_auth}
spring.datasource.password=${AUTH_DATASOURCE_PASSWORD:}
spring.flyway.enabled=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.health.mail.enabled=${SMTP_HEALTH_ENABLED:true}

auth.jwt.secret=${AUTH_JWT_SECRET:dev-auth-secret-change-me-dev-auth-secret}
auth.access-ttl-seconds=${AUTH_ACCESS_TTL_SECONDS:900}
auth.refresh-ttl-seconds=${AUTH_REFRESH_TTL_SECONDS:2592000}
auth.magic-link-ttl-seconds=${AUTH_MAGIC_LINK_TTL_SECONDS:900}
auth.cookie-secure=${AUTH_COOKIE_SECURE:false}
auth.cookie-same-site=${AUTH_COOKIE_SAME_SITE:Lax}
auth.dev-mode=${AUTH_DEV_MODE:true}
auth.manual-login-links=${AUTH_MANUAL_LOGIN_LINKS:false}
auth.admin-login-link-log-enabled=${AUTH_ADMIN_LOGIN_LINK_LOG_ENABLED:false}
auth.public-base-url=${AUTH_PUBLIC_BASE_URL:}
auth.bootstrap-admin-email=${AUTH_BOOTSTRAP_ADMIN_EMAIL:}
auth.privacy-policy-version=${AUTH_PRIVACY_POLICY_VERSION:2026-06-21}
auth.cors.allowed-origins=${AUTH_CORS_ALLOWED_ORIGINS:http://localhost:8088,http://localhost:8090}
auth.passkey.rp-id=${AUTH_PASSKEY_RP_ID:localhost}
auth.passkey.rp-name=${AUTH_PASSKEY_RP_NAME:FraerApp}
auth.passkey.origins=${AUTH_PASSKEY_ORIGINS:http://localhost:8088,http://localhost:8090}
auth.passkey.challenge-ttl-seconds=${AUTH_PASSKEY_CHALLENGE_TTL_SECONDS:300}
auth.passkey.registration-recent-auth-seconds=${AUTH_PASSKEY_REGISTRATION_RECENT_AUTH_SECONDS:600}

spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SMTP_CONNECTION_TIMEOUT:10000}
spring.mail.properties.mail.smtp.timeout=${SMTP_TIMEOUT:10000}
spring.mail.properties.mail.smtp.writetimeout=${SMTP_WRITE_TIMEOUT:10000}
auth.smtp-from=${SMTP_FROM:noreply@fraerapp.ru}
