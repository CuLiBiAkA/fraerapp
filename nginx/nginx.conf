worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Do not log query strings: magic-link tokens are URL parameters.
    log_format main '$remote_addr - $request_method $uri $server_protocol "$status" $body_bytes_sent '
                    'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time '
                    'upstream=$upstream_addr cf_ray="$http_cf_ray" '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 12m;
    server_tokens off;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream fraer_api {
        least_conn;
        server api:8080 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    upstream fraer_auth {
        least_conn;
        server auth-service:8081 max_fails=3 fail_timeout=10s;
        keepalive 16;
    }

    upstream fraer_builder {
        least_conn;
        server story-builder:80 max_fails=3 fail_timeout=10s;
        keepalive 16;
    }

    server {
        listen 80;
        server_name fraerapp.ru www.fraerapp.ru;

        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        location = /nginx_status {
            access_log off;
            stub_status;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name fraerapp.ru www.fraerapp.ru;
        root /usr/share/nginx/html;
        index index.html;

        ssl_certificate /etc/nginx/certs/fraerapp.fullchain.crt;
        ssl_certificate_key /etc/nginx/certs/fraerapp.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy no-referrer always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $fraer_api_upstream api:8080;
            proxy_pass http://$fraer_api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 3s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location /auth/ {
            limit_req zone=api_limit burst=10 nodelay;
            set $fraer_auth_upstream auth-service:8081;
            proxy_pass http://$fraer_auth_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 3s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location ^~ /auth/dev/ {
            access_log off;
            return 404;
        }

        location = /builder {
            return 301 /builder/;
        }

        location /builder/ {
            proxy_pass http://fraer_builder/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 3s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location /uploads/ {
            set $fraer_api_upstream api:8080;
            proxy_pass http://$fraer_api_upstream;
            proxy_set_header Host $http_host;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /actuator/health {
            set $fraer_api_upstream api:8080;
            proxy_pass http://$fraer_api_upstream;
            proxy_set_header Host $http_host;
        }

        location /api-docs {
            set $fraer_api_upstream api:8080;
            proxy_pass http://$fraer_api_upstream;
            proxy_set_header Host $http_host;
        }

        location /swagger-ui.html {
            set $fraer_api_upstream api:8080;
            proxy_pass http://$fraer_api_upstream;
            proxy_set_header Host $http_host;
        }

        location /swagger-ui/ {
            set $fraer_api_upstream api:8080;
            proxy_pass http://$fraer_api_upstream;
            proxy_set_header Host $http_host;
        }

        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }
    }
}
