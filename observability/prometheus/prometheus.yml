global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: fraerapp-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api:8080"]
        labels:
          app: fraerapp
          service: api

  - job_name: fraerapp-auth
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["auth-service:8081"]
        labels:
          app: fraerapp
          service: auth-service

  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]
        labels:
          app: fraerapp
          service: edge

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          app: fraerapp
          service: vps

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          app: fraerapp
          service: docker

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          app: fraerapp
          service: postgres

  - job_name: auth-postgres
    static_configs:
      - targets: ["auth-postgres-exporter:9187"]
        labels:
          app: fraerapp
          service: auth-postgres
