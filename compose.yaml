services:
  edge:
    image: nginx:1.27-alpine
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${HTTP_PORT:-8088}:80"
      - "${HOST_BIND_IP:-127.0.0.1}:${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/${NGINX_CONF:-nginx.local.conf}:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      story-builder:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  story-builder:
    build:
      context: ./story-builder
    ports:
      - "${BUILDER_BIND_IP:-127.0.0.1}:${BUILDER_PORT:-8090}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    depends_on:
      auth-postgres:
        condition: service_healthy
    environment:
      AUTH_SERVER_PORT: 8081
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-dev-auth-secret-change-me-dev-auth-secret}
      AUTH_PUBLIC_BASE_URL: ${AUTH_PUBLIC_BASE_URL:-}
      AUTH_BOOTSTRAP_ADMIN_EMAIL: ${AUTH_BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
      AUTH_PRIVACY_POLICY_VERSION: ${AUTH_PRIVACY_POLICY_VERSION:-2026-06-21}
      AUTH_DEV_MODE: ${AUTH_DEV_MODE:-true}
      AUTH_MANUAL_LOGIN_LINKS: ${AUTH_MANUAL_LOGIN_LINKS:-false}
      AUTH_ADMIN_LOGIN_LINK_LOG_ENABLED: ${AUTH_ADMIN_LOGIN_LINK_LOG_ENABLED:-false}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAME_SITE: ${AUTH_COOKIE_SAME_SITE:-Lax}
      AUTH_CORS_ALLOWED_ORIGINS: ${AUTH_CORS_ALLOWED_ORIGINS:-http://localhost:8088,http://localhost:8090,http://192.168.0.7:8088,http://192.168.0.7:8090}
      AUTH_PASSKEY_RP_ID: ${AUTH_PASSKEY_RP_ID:-localhost}
      AUTH_PASSKEY_RP_NAME: ${AUTH_PASSKEY_RP_NAME:-FraerApp}
      AUTH_PASSKEY_ORIGINS: ${AUTH_PASSKEY_ORIGINS:-http://localhost:8088,http://localhost:8090}
      AUTH_PASSKEY_CHALLENGE_TTL_SECONDS: ${AUTH_PASSKEY_CHALLENGE_TTL_SECONDS:-300}
      AUTH_PASSKEY_REGISTRATION_RECENT_AUTH_SECONDS: ${AUTH_PASSKEY_REGISTRATION_RECENT_AUTH_SECONDS:-600}
      AUTH_TELEGRAM_BOT_ENABLED: ${AUTH_TELEGRAM_BOT_ENABLED:-false}
      AUTH_TELEGRAM_BOT_TOKEN: ${AUTH_TELEGRAM_BOT_TOKEN:-}
      AUTH_TELEGRAM_BOT_USERNAME: ${AUTH_TELEGRAM_BOT_USERNAME:-}
      AUTH_TELEGRAM_WEBHOOK_SECRET: ${AUTH_TELEGRAM_WEBHOOK_SECRET:-}
      AUTH_TELEGRAM_LOGIN_REDIRECT_PATH: ${AUTH_TELEGRAM_LOGIN_REDIRECT_PATH:-/}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@fraerapp.ru}
      SMTP_AUTH: ${SMTP_AUTH:-true}
      SMTP_STARTTLS_ENABLE: ${SMTP_STARTTLS_ENABLE:-true}
      SMTP_STARTTLS_REQUIRED: ${SMTP_STARTTLS_REQUIRED:-true}
      SMTP_HEALTH_ENABLED: ${SMTP_HEALTH_ENABLED:-true}
      AUTH_DATASOURCE_URL: jdbc:postgresql://auth-postgres:5432/${AUTH_POSTGRES_DB:-fraerapp_auth}
      AUTH_DATASOURCE_USERNAME: ${AUTH_POSTGRES_USER:-fraerapp_auth}
      AUTH_DATASOURCE_PASSWORD: ${AUTH_POSTGRES_PASSWORD:-fraerapp-auth-password}
    expose:
      - "8081"
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8081; printf \"GET /actuator/health/readiness HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"200\" <&3'"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-fraerapp}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-fraerapp}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-fraerapp-password}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-dev-auth-secret-change-me-dev-auth-secret}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8088,http://localhost:8090,http://192.168.0.7:8088,http://192.168.0.7:8090}
      ASSET_STORAGE_PATH: /data/uploads
      ASSET_PUBLIC_PATH: /uploads
    volumes:
      - story-uploads:/data/uploads
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8080; printf \"GET /actuator/health/readiness HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"200\" <&3'"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          memory: 256M

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fraerapp}
      POSTGRES_USER: ${POSTGRES_USER:-fraerapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fraerapp-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  auth-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${AUTH_POSTGRES_DB:-fraerapp_auth}
      POSTGRES_USER: ${AUTH_POSTGRES_USER:-fraerapp_auth}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD:-fraerapp-auth-password}
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
      - --web.enable-lifecycle
    ports:
      - "${OBSERVABILITY_INTERNAL_BIND_IP:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    depends_on:
      - node-exporter
      - cadvisor
      - nginx-exporter
      - postgres-exporter
      - auth-postgres-exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "${GRAFANA_BIND_IP:-0.0.0.0}:${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-this-grafana-password}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_LOG_MODE: console
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:3.3.2
    command: -config.file=/etc/loki/config.yml
    ports:
      - "${OBSERVABILITY_INTERNAL_BIND_IP:-127.0.0.1}:${LOKI_PORT:-3100}:3100"
    volumes:
      - ./observability/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.3.2
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/containers/storage/.+)($$|/)
    pid: host
    volumes:
      - /:/host:ro
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.2
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    restart: unless-stopped

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.0
    command:
      - --nginx.scrape-uri=http://edge/nginx_status
    depends_on:
      edge:
        condition: service_healthy
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-fraerapp}:${POSTGRES_PASSWORD:-fraerapp-password}@postgres:5432/${POSTGRES_DB:-fraerapp}?sslmode=disable
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  auth-postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_NAME: postgresql://${AUTH_POSTGRES_USER:-fraerapp_auth}:${AUTH_POSTGRES_PASSWORD:-fraerapp-auth-password}@auth-postgres:5432/${AUTH_POSTGRES_DB:-fraerapp_auth}?sslmode=disable
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
    depends_on:
      auth-postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  auth-postgres-data:
  story-uploads:
  prometheus-data:
  grafana-data:
  loki-data:
