services:
  edge:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-8088}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  story-builder:
    build:
      context: ./story-builder
    ports:
      - "${BUILDER_PORT:-8090}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    environment:
      AUTH_SERVER_PORT: 8081
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-dev-auth-secret-change-me-dev-auth-secret}
      AUTH_PUBLIC_BASE_URL: ${AUTH_PUBLIC_BASE_URL:-http://localhost:8088}
      AUTH_BOOTSTRAP_ADMIN_EMAIL: ${AUTH_BOOTSTRAP_ADMIN_EMAIL:-culibiaka2012@yandex.ru}
      AUTH_DEV_MODE: ${AUTH_DEV_MODE:-true}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_DATASOURCE_URL: jdbc:h2:file:/data/fraerapp-auth;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
      AUTH_DATASOURCE_USERNAME: sa
      AUTH_DATASOURCE_PASSWORD: ""
    volumes:
      - auth-h2-data:/data
    expose:
      - "8081"
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8081; printf \"GET /actuator/health/readiness HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"200\" <&3'"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: .
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:h2:file:/data/fraerapp;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ""
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-dev-auth-secret-change-me-dev-auth-secret}
    volumes:
      - h2-data:/data
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8080; printf \"GET /actuator/health/readiness HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"200\" <&3'"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          memory: 256M

volumes:
  h2-data:
  auth-h2-data:
