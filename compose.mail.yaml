services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: fraerapp-mailserver
    hostname: ${MAIL_HOSTNAME:-mail.fraerapp.ru}
    env_file:
      - path: ./mailserver.env
        required: false
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
    volumes:
      - mail-data:/var/mail/
      - mail-state:/var/mail-state/
      - mail-logs:/var/log/mail/
      - mail-config:/tmp/docker-mailserver/
      - ./nginx/certs:/etc/mail-certs:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      default:
        aliases:
          - mail.fraerapp.ru
    restart: unless-stopped
    stop_grace_period: 1m

volumes:
  mail-data:
  mail-state:
  mail-logs:
  mail-config:
